<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Play</title>
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <a class="turn-home" href="index.html"><i class="bi bi-house-fill"></i></a>
    <div class="container">
        <div id="load">
            <div class="one"></div>
            <div class="two"></div>
            <div class="three"></div>
            <p id="advice">If The Loading Time Is Long, Try Refreshing The Page</p>
        </div>
        <div id="game" class="justify-center flex-colunm " hidden>
            <div id="hub">
                <div id="hub_item">
                    <p id="progressText" class="hub_prefix">Question</p>
                    <div id="progressBar">
                        <div id="progressBarfull"></div>
                    </div>
                </div>
                <div id="hub_item">
                    <p class="hub_prefix">Score</p>
                    <h1 class="hub_main_text" id="score">0</h1>
                </div>
            </div>
            <h2 id="question"></h2>
            <div class="choice-container">
                <p class="choice-letter">A</p>
                <p class="choice-text" data-number="1"></p>
            </div>
            <div class="choice-container">
                <p class="choice-letter">B</p>
                <p class="choice-text" data-number="2"></p>
            </div>
            <div class="choice-container">
                <p class="choice-letter">C</p>
                <p class="choice-text" data-number="3"></p>
            </div>
            <div class="choice-container">
                <p class="choice-letter">D</p>
                <p class="choice-text" data-number="4"></p>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
